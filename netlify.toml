[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[context.production.environment]
  VITE_REQUIRE_BACKEND = "true"

[context.deploy-preview.environment]
  VITE_REQUIRE_BACKEND = "true"

[context.branch-deploy.environment]
  VITE_REQUIRE_BACKEND = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy-Report-Only = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.privy.io https://*.privy.io https://*.walletconnect.com wss://*.walletconnect.com https://*.reown.com wss://*.reown.com https://hermes.pyth.network https://api.hyperliquid.xyz wss://api.hyperliquid.xyz; frame-src https://*.privy.io https://*.walletconnect.com https://*.reown.com"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
